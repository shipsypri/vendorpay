<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Settlements — Australian Transport Prototype</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Caveat:wght@500;700&family=Kalam:wght@400;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="app.css" />
</head>
<body>
<div id="root"></div>

<script type="application/json" id="__tweaks_defaults__">
{}
</script>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script src="data.js?v=3"></script>
<script type="text/babel" src="icons.jsx"></script>
<script type="text/babel" src="shell.jsx"></script>
<script type="text/babel" src="screen-home.jsx"></script>
<script type="text/babel" src="screen-charges.jsx"></script>
<script type="text/babel" src="screen-trip-breakup.jsx"></script>
<script type="text/babel" src="pod-docket.jsx"></script>
<script type="text/babel" src="modal-charge.jsx"></script>

<script type="text/babel">
function App() {
  const [screen, setScreen] = React.useState('charges'); // start on Review Charges
  const [selectedTrip, setSelectedTrip] = React.useState(null);
  const [modal, setModal] = React.useState(null);
  const [tripStatus, setTripStatus] = React.useState({}); // {tripId: 'approved'|'rejected'}
  const [toast, setToast] = React.useState(null);

  const showToast = React.useCallback((msg) => {
    setToast(msg);
    clearTimeout(showToast._t);
    showToast._t = setTimeout(() => setToast(null), 2200);
  }, []);

  const setStatus = React.useCallback((ids, status) => {
    if (!ids.length) return;
    setTripStatus(prev => {
      const next = {...prev};
      ids.forEach(id => { next[id] = status; });
      return next;
    });
    const verb = status === 'approved' ? 'Approved' : 'Rejected';
    showToast(verb + ' ' + ids.length + ' trip' + (ids.length>1?'s':''));
  }, [showToast]);

  const Nav = () => (
    <div style={{
      position:'fixed', right: 16, bottom: 16, zIndex: 50,
      background:'#0E1A36', color:'#fff', padding:'8px 10px', borderRadius:10,
      display:'flex', gap:6, boxShadow:'0 8px 24px rgba(0,0,0,0.25)', fontSize:12
    }}>
      <button onClick={()=>{ setScreen('home'); setSelectedTrip(null); }} style={navBtn(screen==='home')}>Home</button>
      <button onClick={()=>{ setScreen('charges'); setSelectedTrip(null); }} style={navBtn(screen==='charges')}>Review Charges</button>
    </div>
  );

  return (
    <>
      {screen==='home' && <HomeScreen go={setScreen} />}
      {screen==='charges' && (
        <ChargesScreen
          go={setScreen}
          onSelectTrip={(t) => { setSelectedTrip(t); setScreen('breakup'); }}
          tripStatus={tripStatus}
          setStatus={setStatus}
        />
      )}
      {screen==='breakup' && (
        <TripBreakupScreen
          trip={selectedTrip}
          onBack={() => setScreen('charges')}
          onSelectCharge={(c, t) => setModal({ charge: c, trip: t })}
          onApprove={() => { setStatus([selectedTrip.id], 'approved'); setScreen('charges'); }}
          onReject={() => { setStatus([selectedTrip.id], 'rejected'); setScreen('charges'); }}
        />
      )}
      {modal && <ChargeModal open={true} onClose={() => setModal(null)} charge={modal.charge} trip={modal.trip} />}
      {toast && (
        <div style={{position:'fixed', bottom:80, left:'50%', transform:'translateX(-50%)', background:'#1F2533', color:'#fff', padding:'10px 18px', borderRadius:6, fontSize:13, fontWeight:500, boxShadow:'0 4px 16px rgba(0,0,0,0.25)', zIndex:10000}}>
          ✓ {toast}
        </div>
      )}
      <Nav />
    </>
  );
}

function navBtn(active) {
  return {
    background: active ? '#4F65FF' : 'rgba(255,255,255,0.08)',
    color:'#fff', border:'1px solid rgba(255,255,255,0.12)',
    padding:'6px 12px', borderRadius:6, cursor:'pointer', fontSize:12, fontWeight:500,
  };
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
